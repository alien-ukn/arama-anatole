{{- $activityID := .Get 0 -}} <!-- Первый позиционный аргумент (ID активности) -->
{{- $text := .Get 1 -}} <!-- Второй позиционный аргумент (текст) -->
{{- $iconSize := "20px" -}} <!-- Размер иконки по умолчанию -->

<a href="https://connect.garmin.com/modern/activity/{{ $activityID }}" target="_blank" style="text-decoration: underline; text-decoration-style: dotted; color: #333; transition: color 0.3s;">
  <i class="fa-brands fa-garmin" style="font-size: {{ $iconSize }}; color: blue; margin-right: 8px;"></i>{{ $text }}
</a>
